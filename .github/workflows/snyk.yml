name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk-deps:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm
        run: npm install -g npm@11.11.0

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Install production dependencies only
        run: npm install --omit=dev
        working-directory: app

      - name: Snyk - scan production dependencies
        run: snyk test --severity-threshold=high
        working-directory: app
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-code:
    name: Code Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk - scan source code
        run: snyk code test --severity-threshold=high --org=cibaforce1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-container:
    name: Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ots-api:${{ github.sha }} .

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk - scan container image
        run: snyk container test ots-api:${{ github.sha }} --severity-threshold=high --policy-path=app/.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
