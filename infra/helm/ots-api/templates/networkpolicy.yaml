{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ots-api.fullname" . }}
  labels:
    {{- include "ots-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ots-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP traffic inbound on port 3000 only
    - ports:
        - port: 3000
          protocol: TCP

  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound HTTPS to the OneTimeSecret API
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
