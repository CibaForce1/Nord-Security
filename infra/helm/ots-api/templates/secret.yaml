apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ots-api.fullname" . }}-secrets
  labels:
    {{- include "ots-api.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from storing secret values in release history (requires Helm secrets plugin in production)
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  OTS_USER: {{ .Values.secrets.otsUser | quote }}
  OTS_KEY: {{ .Values.secrets.otsKey | quote }}
  OTS_HOST: {{ .Values.secrets.otsHost | quote }}
