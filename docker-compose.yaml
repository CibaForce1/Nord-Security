version: "3.8"

services:
  api:
    container_name: ots-api
    image: ots-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    network_mode: bridge
    ports:
      - "80:80"
      - "3000:3000"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - OTS_USER=compose@example.com
      - OTS_KEY=compose-plaintext-key
      - OTS_HOST=https://onetimesecret.com/api
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "node --inspect=0.0.0.0:9229 src/index.js"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -ksS http://127.0.0.1:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"